name: PR Validation

on:
  pull_request:
    branches: [develop]

jobs:
  lint:
    name: Lint HTML and CSS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm install htmlhint stylelint stylelint-config-standard --save-dev

      - name: Run HTMLHint
        run: |
          npx htmlhint "**/*.html"

      - name: Run Stylelint
        run: |
          npx stylelint "**/*.css"

  build:
    name: Build Website with Parcel
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm install

      - name: Build with Parcel
        run: |
          npx parcel build src/index.html --dist-dir dist --no-source-maps
